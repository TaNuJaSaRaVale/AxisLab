{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow-lg border-0 rounded-4">
            <div class="card-header bg-success text-white text-center rounded-top-4 py-3">
                <h4 class="mb-0 fw-bold">Create Account</h4>
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label text-muted">Choose Username</label>
                        <input type="text" name="username" class="form-control form-control-lg bg-dark text-light border-secondary" required placeholder="New username">
                    </div>
                    <div class="mb-4">
                        <label class="form-label text-muted">Choose Password</label>
                        <input type="password" name="password" class="form-control form-control-lg bg-dark text-light border-secondary" required placeholder="New password">
                    </div>
                    <button type="submit" class="btn btn-success btn-lg w-100 fw-bold">Register</button>
                </form>
            </div>
            <div class="card-footer text-center bg-transparent py-3 border-top border-secondary">
                <span class="text-muted">Already have an account?</span> <a href="{{ url_for('login') }}" class="text-success text-decoration-none fw-bold">Login</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
